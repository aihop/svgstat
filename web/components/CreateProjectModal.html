<template x-if="showCreateModal">
    <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" @click.self="showCreateModal = false">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md mx-4 fade-in-up" @click.stop>
            <h2 class="text-xl font-bold text-gray-900 mb-6" x-text="t('createNewProject')"></h2>
            <form @submit.prevent="createProject()" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2" x-text="t('projectName')"></label>
                    <input 
                        type="text" 
                        x-model="newProject.name"
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
                        :placeholder="t('projectNamePlaceholder')"
                    >
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2" x-text="t('slug')"></label>
                    <input 
                        type="text" 
                        x-model="newProject.slug"
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
                        :placeholder="t('slugPlaceholder')"
                    >
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2" x-text="t('description')"></label>
                    <textarea 
                        x-model="newProject.description"
                        rows="3"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
                        :placeholder="t('descriptionPlaceholder')"
                    ></textarea>
                </div>
                <div class="flex justify-end space-x-4 pt-4">
                    <button type="button" @click="showCreateModal = false" class="px-4 py-2 text-gray-600 hover:text-gray-800" x-text="t('cancel')"></button>
                    <button type="submit" :disabled="creating" class="px-6 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-colors disabled:opacity-50" x-text="creating ? t('creating') : t('create')"></button>
                </div>
            </form>
        </div>
    </div>
</template>
