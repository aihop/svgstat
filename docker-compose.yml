version: '3.8'

services:
  postgres:
    image: postgres:18.3-alpine
    container_name: svgstat-postgres
    environment:
      POSTGRES_USER: svgstat
      POSTGRES_PASSWORD: svgstat
      POSTGRES_DB: svgstat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: pg_isready -U svgstat
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8.6.2-alpine
    container_name: svgstat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
